<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Drill Designer" />
<meta name="theme-color" content="#0b2e3c" />
<title>Beach Drill Designer Pro - Read the Beach</title>
<style>
  :root{
    --sand:#f6efe3; --ink:#10303d; --muted:#6f8893;
    --teal:#0e8a96; --teal-d:#0a6670; --ocean:#0b2e3c; --coral:#ff6b5e; --gold:#e8b06b;
    --panel:#fff; --line:#e0d5c2;
    --font:'Inter',system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{font-family:var(--font);color:var(--ink);background:var(--sand);display:flex;flex-direction:column;height:100vh;overflow:hidden}
  .top{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--ocean);color:#fff;flex:none;flex-wrap:wrap}
  .top .brand{font-weight:800;font-size:.96rem;display:flex;align-items:center;gap:8px}
  .top .brand .m{width:24px;height:24px;border-radius:7px;background:linear-gradient(135deg,var(--teal),var(--gold));display:grid;place-items:center;font-size:.8rem}
  .top .sp{flex:1}
  .top input{border:none;border-radius:8px;padding:7px 10px;font-family:inherit;font-size:.85rem;width:130px}
  .tbtn{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:8px;padding:7px 10px;font-family:inherit;font-weight:600;font-size:.8rem;cursor:pointer}
  .tbtn:hover{background:rgba(255,255,255,.26)}
  .tbtn.on{background:var(--teal);border-color:var(--teal)}
  .tbtn.go{background:var(--coral);border-color:var(--coral)}
  .stage{flex:1;display:flex;min-height:0}
  .tools{width:130px;flex:none;background:var(--panel);border-right:1px solid var(--line);padding:10px;overflow-y:auto}
  .tgrp{font-size:.62rem;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);font-weight:700;margin:10px 2px 6px}
  .tool{display:flex;align-items:center;gap:8px;width:100%;border:1.5px solid var(--line);background:#fff;border-radius:9px;padding:8px 9px;margin-bottom:5px;font-family:inherit;font-size:.8rem;font-weight:600;color:var(--ink);cursor:pointer;text-align:left}
  .tool:hover{border-color:var(--teal)}
  .tool.active{background:var(--teal);border-color:var(--teal);color:#fff}
  .tool .ic{width:20px;height:20px;flex:none;display:grid;place-items:center;font-size:.85rem}
  .dot{width:17px;height:17px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:.58rem;font-weight:800}
  .court-wrap{flex:1;position:relative;display:grid;place-items:center;padding:12px;min-width:0}
  svg.court{width:100%;height:100%;max-width:100%;max-height:100%;touch-action:none;border-radius:14px}
  .token{cursor:grab}
  .token text{font-family:var(--font);font-weight:800;font-size:13px;pointer-events:none;user-select:none}
  .hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:rgba(11,46,60,.85);color:#fff;font-size:.78rem;padding:6px 12px;border-radius:999px;pointer-events:none}
  .side{width:210px;flex:none;background:var(--panel);border-left:1px solid var(--line);padding:12px;overflow-y:auto}
  .side h4{font-size:.64rem;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin:14px 0 6px}
  .side h4:first-child{margin-top:0}
  .srow{display:flex;align-items:center;gap:6px;font-size:.79rem;padding:6px 8px;border:1px solid var(--line);border-radius:8px;margin-bottom:5px;background:#fff}
  .srow .x{margin-left:auto;cursor:pointer;color:var(--muted);font-weight:800}
  .full{width:100%;border:none;border-radius:9px;padding:8px;font-family:inherit;font-weight:700;font-size:.8rem;cursor:pointer;margin-bottom:5px;color:#fff;background:var(--teal)}
  .full.alt{background:var(--ocean)}
  .full.ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line)}
  .empty{color:var(--muted);font-size:.77rem;padding:5px 0}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:5px}
  select,textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:7px;font-family:inherit;font-size:.8rem;background:#fff;color:var(--ink)}
  textarea{resize:vertical;min-height:54px}
  label.lab{font-size:.78rem;color:var(--ink-soft);display:flex;align-items:center;gap:6px;margin:4px 0}
  body.present .tools,body.present .side,body.present .top .brand,body.present .top input{display:none}
  @media(max-width:820px){
    .tools{width:92px}.side{display:none}
    .tool{font-size:0;gap:0;justify-content:center;padding:9px 0}
    .tool .ic{width:auto}
  }
</style>
</head>
<body>
<div class="top">
  <div class="brand"><span class="m">V</span> Beach Drill Designer <span style="opacity:.6;font-weight:600">Pro</span></div>
  <a class="tbtn" href="index.html" style="text-decoration:none">&#8599; Hub</a>
  <span class="sp"></span>
  <button class="tbtn" id="b-grid">Grid</button>
  <button class="tbtn" id="b-num">#</button>
  <button class="tbtn" id="b-present">Present</button>
  <input id="dname" placeholder="Drill name..." />
  <button class="tbtn" id="b-save">Save</button>
  <button class="tbtn" id="b-png">PNG</button>
  <button class="tbtn" id="b-print">Print</button>
  <button class="tbtn" id="b-book">Playbook</button>
  <button class="tbtn go" id="b-play">&#9654; Play</button>
</div>

<div class="stage">
  <div class="tools" id="tools">
    <div class="tgrp">Tools</div>
    <button class="tool active" data-tool="select"><span class="ic">&#10021;</span>Select</button>
    <button class="tool" data-tool="delete"><span class="ic">&#128465;</span>Delete</button>
    <div class="tgrp">Players</div>
    <button class="tool" data-tool="A"><span class="ic"><span class="dot" style="background:var(--teal)">A</span></span>Team A</button>
    <button class="tool" data-tool="B"><span class="ic"><span class="dot" style="background:var(--coral)">B</span></span>Team B</button>
    <button class="tool" data-tool="coach"><span class="ic"><span class="dot" style="background:var(--ocean)">C</span></span>Coach</button>
    <div class="tgrp">Items</div>
    <button class="tool" data-tool="ball"><span class="ic">&#9679;</span>Ball</button>
    <button class="tool" data-tool="cone"><span class="ic">&#9650;</span>Cone</button>
    <button class="tool" data-tool="target"><span class="ic">&#9678;</span>Target</button>
    <button class="tool" data-tool="ladder"><span class="ic">&#9783;</span>Ladder</button>
    <button class="tool" data-tool="blocker"><span class="ic">&#9794;</span>Blocker</button>
    <button class="tool" data-tool="hoop"><span class="ic">&#11096;</span>Hoop</button>
    <button class="tool" data-tool="text"><span class="ic">T</span>Label</button>
    <div class="tgrp">Paths</div>
    <button class="tool" data-tool="move"><span class="ic">&#8594;</span>Run</button>
    <button class="tool" data-tool="pass"><span class="ic">&#8594;</span>Pass / Set</button>
    <button class="tool" data-tool="hit"><span class="ic">&#8658;</span>Hit / Serve</button>
    <button class="tool" data-tool="arc"><span class="ic">&#8631;</span>Lob / arc</button>
    <button class="tool" data-tool="draw"><span class="ic">&#9998;</span>Free draw</button>
    <button class="tool" data-tool="zone"><span class="ic">&#9633;</span>Zone</button>
    <div class="tgrp">Beach + Analysis</div>
    <button class="tool" data-tool="wind"><span class="ic">&#10230;</span>Wind</button>
    <button class="tool" data-tool="sun"><span class="ic">&#9728;</span>Sun</button>
    <button class="tool" data-tool="shot"><span class="ic">&#9737;</span>Shot map</button>
    <div class="tgrp">Edit</div>
    <button class="tool" data-tool="_undo"><span class="ic">&#8630;</span>Undo</button>
    <button class="tool" data-tool="_clear"><span class="ic">&#10005;</span>Clear</button>
  </div>

  <div class="court-wrap">
    <svg class="court" id="svg" viewBox="0 0 800 470" preserveAspectRatio="xMidYMid meet"></svg>
    <div class="hint" id="hint">16 x 8 m beach court. Tap a tool, then tap to place. Drag to move.</div>
  </div>

  <div class="side">
    <h4>Templates</h4>
    <div class="row2">
      <button class="full ghost" data-tpl="empty" style="margin:0">Empty</button>
      <button class="full ghost" data-tpl="2v2" style="margin:0">2 v 2</button>
      <button class="full ghost" data-tpl="receive" style="margin:0">Serve-rec</button>
      <button class="full ghost" data-tpl="pepper" style="margin:0">Pepper</button>
    </div>

    <h4>AI suggest a drill</h4>
    <select id="ai-focus">
      <option value="serving">Focus: Serving</option>
      <option value="passing">Focus: Passing</option>
      <option value="defense">Focus: Defense</option>
      <option value="sideout">Focus: Side-out</option>
    </select>
    <button class="full" id="b-ai" style="margin-top:6px">Generate drill</button>

    <h4>Coaching notes</h4>
    <textarea id="notes" placeholder="Setup, scoring, coaching points..."></textarea>
    <div class="row2" style="margin-top:5px">
      <select id="d-skill"><option value="">Skill...</option><option>Serving</option><option>Passing</option><option>Setting</option><option>Attacking</option><option>Blocking</option><option>Defense</option><option>Movement</option></select>
      <select id="d-diff"><option value="">Level...</option><option>Beginner</option><option>Intermediate</option><option>Advanced</option></select>
    </div>
    <select id="d-corner" style="margin-top:5px"><option value="">Corner...</option><option>Technical/Tactical</option><option>Physical</option><option>Psychological</option><option>Social</option></select>

    <h4>Animation</h4>
    <div id="frames"></div>
    <button class="full" id="b-frame">+ Capture frame</button>
    <label class="lab"><input type="checkbox" id="loop"> Loop</label>
    <label class="lab">Speed <input type="range" id="speed" min="1" max="5" value="3" style="flex:1"></label>
    <button class="full ghost" id="b-clearframes">Clear frames</button>

    <h4>Backdrop (telestrator)</h4>
    <button class="full ghost" id="b-bg">Import image</button>
    <button class="full ghost" id="b-bgclear">Remove image</button>

    <h4>Saved drills</h4>
    <input id="d-search" placeholder="Search saved..." style="width:100%;border:1px solid var(--line);border-radius:8px;padding:7px;font-family:inherit;font-size:.8rem;margin-bottom:6px;background:#fff;color:var(--ink)" />
    <div id="saved"></div>

    <h4>Share / data</h4>
    <button class="full alt" id="b-link">Copy share link</button>
    <button class="full ghost" id="b-export">Export JSON</button>
    <button class="full ghost" id="b-import">Import JSON</button>
  </div>
</div>

<script>
(function(){
  "use strict";
  var svg=document.getElementById("svg");
  var SVGNS="http://www.w3.org/2000/svg";
  var W=800,H=470;
  var CX=100,CY=60,CW=600,CH=300,NETX=CX+CW/2;
  var state={tokens:[],arrows:[],frames:[],notes:"",backdrop:null};
  var history=[];
  var tool="select", seq=1, gridOn=false, numOn=false;
  function uid(){return "o"+(seq++)+"_"+Date.now().toString(36)}
  var mem={};
  function lsGet(k){try{return localStorage.getItem(k)}catch(e){return mem[k]||null}}
  function lsSet(k,v){try{localStorage.setItem(k,v)}catch(e){mem[k]=v}}
  function el(id){return document.getElementById(id)}

  function defs(){
    function mk(id,col){return '<marker id="'+id+'" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="'+col+'"/></marker>';}
    return '<defs>'+
      '<linearGradient id="sand" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f1dab0"/><stop offset="1" stop-color="#e2bb7e"/></linearGradient>'+
      '<linearGradient id="courtg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#e7c388"/><stop offset="1" stop-color="#d6a85f"/></linearGradient>'+
      '<radialGradient id="gA" cx="0.35" cy="0.3" r="0.85"><stop offset="0" stop-color="#27b7c2"/><stop offset="1" stop-color="#0a6670"/></radialGradient>'+
      '<radialGradient id="gB" cx="0.35" cy="0.3" r="0.85"><stop offset="0" stop-color="#ff9084"/><stop offset="1" stop-color="#d8453a"/></radialGradient>'+
      '<radialGradient id="gC" cx="0.35" cy="0.3" r="0.85"><stop offset="0" stop-color="#356073"/><stop offset="1" stop-color="#0b2e3c"/></radialGradient>'+
      '<radialGradient id="gBall" cx="0.35" cy="0.3" r="0.85"><stop offset="0" stop-color="#ffe9b6"/><stop offset="1" stop-color="#dd9d38"/></radialGradient>'+
      '<filter id="sh" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="2.5" stdDeviation="2.2" flood-color="#3a2a10" flood-opacity="0.35"/></filter>'+
      '<pattern id="grain" width="16" height="16" patternUnits="userSpaceOnUse"><circle cx="3" cy="4" r="1" fill="#c89a5a" opacity="0.22"/><circle cx="11" cy="10" r="1" fill="#cda468" opacity="0.18"/></pattern>'+
      mk("mkMove","#0e8a96")+mk("mkPass","#0a6670")+mk("mkHit","#e8554a")+mk("mkWind","#2b7fd0")+
      '</defs>';
  }
  function courtSVG(){
    var s="";
    if(state.backdrop){
      s+='<image href="'+state.backdrop+'" x="0" y="0" width="800" height="470" preserveAspectRatio="xMidYMid slice"/>';
    } else {
      s+='<rect x="0" y="0" width="800" height="470" fill="url(#sand)"/><rect x="0" y="0" width="800" height="470" fill="url(#grain)"/>';
      s+='<rect x="'+CX+'" y="'+CY+'" width="'+CW+'" height="'+CH+'" rx="6" fill="url(#courtg)" stroke="#ffffff" stroke-width="5" filter="url(#sh)"/>';
      if(gridOn){
        var g='<g stroke="#ffffff" stroke-width="1" opacity="0.28">';
        for(var m=1;m<16;m++){var x=CX+m*(CW/16);g+='<line x1="'+x+'" y1="'+CY+'" x2="'+x+'" y2="'+(CY+CH)+'"/>';}
        for(var n=1;n<8;n++){var y=CY+n*(CH/8);g+='<line x1="'+CX+'" y1="'+y+'" x2="'+(CX+CW)+'" y2="'+y+'"/>';}
        s+=g+'</g>';
      }
      s+='<line x1="'+NETX+'" y1="'+(CY-8)+'" x2="'+NETX+'" y2="'+(CY+CH+8)+'" stroke="#ffffff" stroke-width="3"/>';
      s+='<line x1="'+NETX+'" y1="'+CY+'" x2="'+NETX+'" y2="'+(CY+CH)+'" stroke="#ffffff" stroke-width="9" stroke-dasharray="2 6" opacity="0.85"/>';
      s+='<circle cx="'+NETX+'" cy="'+(CY-8)+'" r="5" fill="#0b2e3c"/><circle cx="'+NETX+'" cy="'+(CY+CH+8)+'" r="5" fill="#0b2e3c"/>';
      s+='<text x="'+(CX+CW/2)+'" y="'+(CY+CH+30)+'" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#7a5a2a">16 m</text>';
      s+='<text x="'+(CX-22)+'" y="'+(CY+CH/2)+'" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#7a5a2a" transform="rotate(-90 '+(CX-22)+' '+(CY+CH/2)+')">8 m</text>';
    }
    // legend
    s+='<g font-family="sans-serif" font-size="11" fill="'+(state.backdrop?"#fff":"#5a4322")+'">'+
      '<line x1="120" y1="448" x2="156" y2="448" stroke="#0e8a96" stroke-width="3" marker-end="url(#mkMove)"/><text x="162" y="452">run</text>'+
      '<line x1="214" y1="448" x2="250" y2="448" stroke="#0a6670" stroke-width="3" stroke-dasharray="9 7" marker-end="url(#mkPass)"/><text x="256" y="452">pass</text>'+
      '<path d="M320,452 Q342,430 364,452" fill="none" stroke="#0a6670" stroke-width="3" marker-end="url(#mkPass)"/><text x="370" y="452">lob</text>'+
      '<line x1="424" y1="448" x2="460" y2="448" stroke="#e8554a" stroke-width="5" marker-end="url(#mkHit)"/><text x="466" y="452">hit</text>'+
      '<rect x="520" y="441" width="22" height="14" rx="4" fill="rgba(14,138,150,.16)" stroke="#0a6670" stroke-width="2" stroke-dasharray="4 4"/><text x="548" y="452">zone</text>'+
      '</g>';
    return s;
  }
  function tokenSVG(t){
    var g='<g class="token" data-id="'+t.id+'" transform="translate('+t.x+','+t.y+')">';
    if(t.type==="A"||t.type==="B"||t.type==="coach"){
      var grad=t.type==="A"?"url(#gA)":(t.type==="B"?"url(#gB)":"url(#gC)");
      g+='<circle r="18" fill="'+grad+'" stroke="#fff" stroke-width="2.5" filter="url(#sh)"/><text x="0" y="5" text-anchor="middle" fill="#fff">'+esc(t.label)+'</text>';
    } else if(t.type==="ball"){g+='<circle r="9" fill="url(#gBall)" stroke="#8a6326" stroke-width="1.5" filter="url(#sh)"/>';}
    else if(t.type==="cone"){g+='<polygon points="0,-14 12,12 -12,12" fill="#ff8c3b" stroke="#9a4d12" stroke-width="2" filter="url(#sh)"/>';}
    else if(t.type==="target"){g+='<circle r="15" fill="rgba(255,255,255,.5)" stroke="#0a6670" stroke-width="3"/><circle r="8" fill="none" stroke="#0a6670" stroke-width="2"/><circle r="2.5" fill="#0a6670"/>';}
    else if(t.type==="ladder"){g+='<rect x="-9" y="-20" width="18" height="40" rx="3" fill="#f3c34a" stroke="#9a7415" stroke-width="2"/><line x1="-9" y1="-8" x2="9" y2="-8" stroke="#9a7415" stroke-width="2"/><line x1="-9" y1="4" x2="9" y2="4" stroke="#9a7415" stroke-width="2"/>';}
    else if(t.type==="blocker"){g+='<rect x="-9" y="-22" width="18" height="40" rx="9" fill="#7d8b93" stroke="#4a565c" stroke-width="2" filter="url(#sh)"/><circle cx="0" cy="-22" r="7" fill="#7d8b93" stroke="#4a565c" stroke-width="2"/>';}
    else if(t.type==="hoop"){g+='<ellipse cx="0" cy="0" rx="18" ry="9" fill="none" stroke="#d8453a" stroke-width="3"/>';}
    else if(t.type==="sun"){g+='<circle r="11" fill="#ffd45e" stroke="#e0a52a" stroke-width="2"/><g stroke="#e0a52a" stroke-width="2"><line x1="0" y1="-16" x2="0" y2="-20"/><line x1="0" y1="16" x2="0" y2="20"/><line x1="-16" y1="0" x2="-20" y2="0"/><line x1="16" y1="0" x2="20" y2="0"/></g>';}
    else if(t.type==="text"){g+='<text x="0" y="0" text-anchor="middle" fill="'+(state.backdrop?"#fff":"#10303d")+'" font-size="15">'+esc(t.label)+'</text>';}
    g+='</g>';
    return g;
  }
  function arrowSVG(a){
    if(a.kind==="zone"){
      if(a.pts.length<2)return "";
      var zx=Math.min(a.pts[0][0],a.pts[1][0]),zy=Math.min(a.pts[0][1],a.pts[1][1]);
      var zw=Math.abs(a.pts[1][0]-a.pts[0][0]),zh=Math.abs(a.pts[1][1]-a.pts[0][1]);
      return '<rect x="'+zx+'" y="'+zy+'" width="'+zw+'" height="'+zh+'" rx="8" fill="rgba(14,138,150,.16)" stroke="#0a6670" stroke-width="2" stroke-dasharray="6 6"/>';
    }
    if(a.pts.length<2)return "";
    var p0=a.pts[0],p1=a.pts[a.pts.length-1];
    if(a.kind==="wind"){
      return '<line x1="'+p0[0]+'" y1="'+p0[1]+'" x2="'+p1[0]+'" y2="'+p1[1]+'" stroke="#2b7fd0" stroke-width="6" opacity="0.7" marker-end="url(#mkWind)"/><text x="'+p0[0]+'" y="'+(p0[1]-8)+'" font-family="sans-serif" font-size="12" fill="#2b7fd0" font-weight="bold">wind</text>';
    }
    if(a.kind==="shot"){
      return '<line x1="'+p0[0]+'" y1="'+p0[1]+'" x2="'+p1[0]+'" y2="'+p1[1]+'" stroke="#e8b06b" stroke-width="2.5" opacity="0.85"/><circle cx="'+p1[0]+'" cy="'+p1[1]+'" r="4" fill="#e8b06b" stroke="#9a7415"/>';
    }
    var col=a.kind==="pass"?"#0a6670":(a.kind==="hit"?"#e8554a":(a.kind==="draw"?"#10303d":(a.kind==="arc"?"#0a6670":"#0e8a96")));
    var w=a.kind==="hit"?5:3;
    if(a.kind==="draw"){var pts=a.pts.map(function(p){return p[0]+","+p[1]}).join(" ");return '<polyline points="'+pts+'" fill="none" stroke="'+col+'" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>';}
    if(a.kind==="arc"){
      var mx=(p0[0]+p1[0])/2,my=(p0[1]+p1[1])/2;
      var dx=p1[0]-p0[0],dy=p1[1]-p0[1];var len=Math.sqrt(dx*dx+dy*dy)||1;var off=Math.min(120,len*0.4);
      var cxp=Math.round(mx-dy/len*off), cyp=Math.round(my+dx/len*off);
      return '<path d="M'+p0[0]+','+p0[1]+' Q'+cxp+','+cyp+' '+p1[0]+','+p1[1]+'" fill="none" stroke="'+col+'" stroke-width="3" marker-end="url(#mkPass)"/>';
    }
    var mk=a.kind==="pass"?"url(#mkPass)":(a.kind==="hit"?"url(#mkHit)":"url(#mkMove)");
    var dash=a.kind==="pass"?'stroke-dasharray="9 7"':'';
    if(a.c){return '<path d="M'+p0[0]+','+p0[1]+' Q'+a.c[0]+','+a.c[1]+' '+p1[0]+','+p1[1]+'" fill="none" stroke="'+col+'" stroke-width="'+w+'" '+dash+' marker-end="'+mk+'"/>';}

    var spd=parseInt(el("speed").value,10)||3;var seg=900-(spd-1)*150;var loop=el("loop").checked;

    saved.forEach(function(it){state=JSON.parse(JSON.stringify(it.state));render();parts.push({name:it.name,svg:svg.innerHTML,notes:(it.state&&it.state.notes)||""});});
    state=JSON.parse(cur);tool=savedTool;render();
    var w=window.open("","_blank");if(!w){alert("Allow pop-ups to print the playbook.");return;}
    var body=parts.map(function(p){return '<div class="d"><h2>'+esc(p.name)+'</h2><svg xmlns="'+SVGNS+'" viewBox="0 0 '+W+' '+H+'">'+p.svg+'</svg><pre>'+esc(p.notes)+'</pre></div>';}).join("");
    w.document.write('<html><head><title>Read the Beach - Playbook</title><style>body{font-family:Arial;color:#10303d;padding:20px}.d{page-break-after:always;margin-bottom:30px}h2{margin:0 0 6px}svg{width:100%;max-width:740px;border:1px solid #ddd;border-radius:10px}pre{white-space:pre-wrap;font-family:Arial;font-size:13px}</style></head><body><h1>Read the Beach - Drill Playbook</h1>'+body+'</body></html>');
    w.document.close();setTimeout(function(){try{w.print()}catch(e){}},400);
  };
  el("b-export").onclick=function(){var a=document.createElement("a");a.download=(el("dname").value.trim()||"beach-drill")+".json";a.href="data:application/json;charset=utf-8,"+encodeURIComponent(JSON.stringify({name:el("dname").value,state:state}));a.click();};
  el("b-import").onclick=function(){var inp=document.createElement("input");inp.type="file";inp.accept="application/json";inp.onchange=function(){var f=inp.files[0];if(!f)return;var fr=new FileReader();fr.onload=function(){try{var o=JSON.parse(fr.result);state=o.state||o;el("dname").value=o.name||"";syncUI();render();renderFrames();}catch(err){alert("Could not read that file.");}};fr.readAsText(f);};inp.click();};
  el("b-link").onclick=function(){
    try{
      var payload=encodeURIComponent(JSON.stringify({name:el("dname").value,state:state}));
      var link=location.origin+location.pathname+"#d="+payload;
      if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(link).then(function(){alert("Share link copied.");},function(){prompt("Copy this link:",link);});}
      else{prompt("Copy this link:",link);}
    }catch(e){alert("Could not build link (drill may be too large with an image).");}
  };
  function loadFromHash(){
    try{if(location.hash.indexOf("#d=")===0){var o=JSON.parse(decodeURIComponent(location.hash.slice(3)));if(o&&o.state){state=o.state;el("dname").value=o.name||"";return true;}}}catch(e){}
    return false;
  }

  function seed(){
    state.tokens=[{id:uid(),type:"A",x:200,y:150,label:"A1"},{id:uid(),type:"A",x:200,y:270,label:"A2"},{id:uid(),type:"B",x:600,y:150,label:"B1"},{id:uid(),type:"B",x:600,y:270,label:"B2"},{id:uid(),type:"ball",x:330,y:210,label:""}];
  }
  if(!loadFromHash())seed();
  syncUI();render();renderFrames();renderSaved();setHint();
})();
</script>
</body>
</html>
